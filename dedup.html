<!DOCTYPE html>
<html>
<head>
    <title>Kelphi Deduplicator</title>
    <style>
        body { font-family: system-ui; background: #1a1a2e; color: #e0e0e0; padding: 2rem; }
        h1 { color: #00d9ff; }
        button { background: #00d9ff; color: #000; padding: 12px 24px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin: 10px 5px 10px 0; }
        button:hover { background: #00b8d9; }
        button.danger { background: #ff4757; color: white; }
        pre { background: #0d0d14; padding: 1rem; border-radius: 8px; overflow-x: auto; max-height: 400px; overflow-y: auto; }
        .success { color: #10b981; }
        .warning { color: #f59e0b; }
    </style>
</head>
<body>
    <h1>🧹 Kelphi Deduplicator</h1>
    <p>This will find duplicate bookings and keep only the <strong>oldest</strong> version of each.</p>
    
    <button onclick="analyze()">1. Analyze Duplicates</button>
    <button onclick="deduplicate()" class="danger">2. Remove Duplicates (Keep Oldest)</button>
    <button onclick="location.href='https://puddlesmcsplashy.github.io/KELPHI/'">3. Go to Kelphi</button>
    
    <h2>Results:</h2>
    <pre id="output">Click "Analyze Duplicates" to start...</pre>

    <script>
        function getKelphiData() {
            const raw = localStorage.getItem('kelphi_data');
            if (!raw) return null;
            return JSON.parse(raw);
        }
        
        function saveKelphiData(data) {
            localStorage.setItem('kelphi_data', JSON.stringify(data));
        }
        
        function analyze() {
            const data = getKelphiData();
            if (!data || !data.leads) {
                document.getElementById('output').textContent = 'No Kelphi data found in localStorage!';
                return;
            }
            
            const leads = data.leads;
            const byName = {};
            
            // Group by booking name (normalized)
            leads.forEach(lead => {
                const name = (lead.bookingName || lead.account || 'Unknown').toLowerCase().trim();
                if (!byName[name]) byName[name] = [];
                byName[name].push(lead);
            });
            
            // Find duplicates
            const duplicates = Object.entries(byName).filter(([name, arr]) => arr.length > 1);
            
            let output = `Total leads: ${leads.length}\n`;
            output += `Unique booking names: ${Object.keys(byName).length}\n`;
            output += `Bookings with duplicates: ${duplicates.length}\n\n`;
            
            if (duplicates.length === 0) {
                output += '✅ No duplicates found!';
            } else {
                output += '⚠️ DUPLICATES FOUND:\n\n';
                duplicates.forEach(([name, arr]) => {
                    output += `"${name}" - ${arr.length} copies:\n`;
                    arr.sort((a, b) => new Date(a.createdAt || 0) - new Date(b.createdAt || 0));
                    arr.forEach((lead, i) => {
                        const created = lead.createdAt ? new Date(lead.createdAt).toLocaleDateString() : 'unknown';
                        const marker = i === 0 ? ' ← KEEP (oldest)' : ' ← DELETE';
                        output += `  ${i+1}. Created: ${created} | Status: ${lead.status || 'none'}${marker}\n`;
                    });
                    output += '\n';
                });
            }
            
            document.getElementById('output').textContent = output;
        }
        
        function deduplicate() {
            const data = getKelphiData();
            if (!data || !data.leads) {
                document.getElementById('output').textContent = 'No Kelphi data found!';
                return;
            }
            
            const leads = data.leads;
            const byName = {};
            
            // Group by booking name
            leads.forEach(lead => {
                const name = (lead.bookingName || lead.account || 'Unknown').toLowerCase().trim();
                if (!byName[name]) byName[name] = [];
                byName[name].push(lead);
            });
            
            // Keep oldest of each
            const kept = [];
            const removed = [];
            
            Object.entries(byName).forEach(([name, arr]) => {
                arr.sort((a, b) => new Date(a.createdAt || 0) - new Date(b.createdAt || 0));
                kept.push(arr[0]); // Keep oldest
                removed.push(...arr.slice(1)); // Remove rest
            });
            
            // Save
            data.leads = kept;
            saveKelphiData(data);
            
            let output = `✅ DEDUPLICATION COMPLETE!\n\n`;
            output += `Kept: ${kept.length} leads (oldest of each)\n`;
            output += `Removed: ${removed.length} duplicates\n\n`;
            output += `Refresh Kelphi to see the cleaned data.\n`;
            output += `(The Supabase sync will update automatically)`;
            
            document.getElementById('output').innerHTML = `<span class="success">${output}</span>`;
        }
    </script>
</body>
</html>
